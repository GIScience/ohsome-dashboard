sonar.organization=giscience
sonar.projectKey=GIScience_ohsome-dashboard
sonar.projectName=ohsome dashboard

# settings for pull requests
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=GIScience/ohsome-dashboard
sonar.pullrequest.github.endpoint=https://api.github.com/

sonar.sources=src
sonar.exclusions=Semantic-UI-2.2.13/**,prism/**,test-setup-files/**

# settings for code coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.spec.ts

# settings for code duplication
sonar.cpd.exclusions=**/*mock*.ts
