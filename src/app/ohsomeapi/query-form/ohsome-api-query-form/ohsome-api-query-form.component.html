<div class="ui one column grid">
  <!-- Identifier to distinguish ohsome query from oqt query -->
  <input type="hidden" name="backend" value="ohsomeApi" ngModel="ohsomeApi">
  <!-- update time -->
  @if (viewUpdateTime) {
    <div class="row" [attr.data-tooltip]="maxDate | date:'yyyy-MM-dd HH:mm'"
         data-position="bottom center">
      <div class="center aligned column">
        <div class="ui small statistic">
          <div class="label" i18n>
            Last Data Update
          </div>
          <div class="value">
            {{ getMaxDateAsDate() | timeAgo }}
          </div>
        </div>
      </div>
    </div>
    <div class="ui divider"></div>
  }

  <!-- Begin Filter section: either simple or advanced tab-->

  <div class="row">
    <div id="filter" class="column">
      <h4 class="ui header"><i class="filter icon"></i>Filter</h4>
        <div class="row">
          <!-- filter -->
          <div id="filter_param" class="column">
            <a href="https://docs.ohsome.org/ohsome-api/v1/filter.html" target="_blank" i18n>How does this work?</a>
            <div class="field">
              <textarea name="filter" [(ngModel)]="selectedFilter">
                building=* and building!=no and
                geometry:polygon
              </textarea>
            </div>
          </div>
        </div>
<!--      }-->
<!--    </div>-->
  </div>
</div>

<!-- End of Filter section-->
  <div class="ui divider"></div>
<!-- measure -->
<div class="row">
  <div class="column">
    <h4 class="ui header" i18n><i class="expand icon"></i>Measure</h4>
    <div class="four inline fields">
      @for (option of measureOptions; track option) {
        <div class="field">
          <div class="ui radio checkbox">
            <input name="measure" type="radio" [value]="option.value" [checked]="option.value === measure"
              (change)="fireResize()"
              [(ngModel)]="measure"
              required>
            <label style="white-space: nowrap;">{{option.label}}</label>
          </div>
        </div>
      }
    </div>

    <!--    <div *ngIf="measure.valid" class="ui small negative icon message">-->
    <!--      <i class="minus circle icon"></i>-->
    <!--      Please choose an option-->
  <!--    </div>-->
</div>
</div>
